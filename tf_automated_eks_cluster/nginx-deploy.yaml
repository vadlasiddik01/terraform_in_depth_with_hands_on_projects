apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
      - name: nginx
        image: nginx
        resources:
           requests:
            cpu: "100m"
            memory: "128Mi"

           limits:
            cpu: "500m"
            memory: "512Mi"